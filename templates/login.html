<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Panel Elite</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/CristianBatero/panel_web/main/icono.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Fondo animado estilo iOS */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 122, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(88, 86, 214, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 40% 20%, rgba(94, 92, 230, 0.1) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-50px, -50px) rotate(180deg); }
        }
        
        .login-container {
            background: rgba(28, 28, 30, 0.95);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                        0 0 0 1px rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }
        
        .lock-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo h1 {
            color: #FFFFFF;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .logo p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            font-weight: 400;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        
        input[type="password"] {
            width: 100%;
            padding: 16px 18px;
            background: rgba(58, 58, 60, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 17px;
            color: #FFFFFF;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        input[type="password"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        input[type="password"]:focus {
            outline: none;
            background: rgba(58, 58, 60, 1);
            border-color: #007AFF;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.15);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(0, 122, 255, 0.3);
            letter-spacing: 0.3px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 122, 255, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .error {
            background: rgba(255, 59, 48, 0.15);
            border: 1px solid rgba(255, 59, 48, 0.3);
            color: #FF3B30;
            font-size: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 16px;
            display: none;
            text-align: center;
        }
        
        /* Animación de entrada */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-container {
            animation: fadeInUp 0.6s ease;
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 40px 30px;
                margin: 20px;
                max-width: 100%;
            }
            
            .logo h1 {
                font-size: 28px;
            }
            
            .logo p {
                font-size: 14px;
            }
            
            .lock-icon {
                width: 70px;
                height: 70px;
                font-size: 36px;
                margin-bottom: 24px;
            }
            
            input[type="password"] {
                font-size: 16px; /* Evita zoom en iOS */
            }
            
            .btn {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="lock-icon">🔒</div>
        <div class="logo">
            <h1>Panel Elite</h1>
            <p>Acceso Restringido</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="pin">PIN de Administrador</label>
                <input type="password" id="pin" name="pin" placeholder="Ingresa tu PIN" required autofocus>
            </div>
            <button type="submit" class="btn">Ingresar</button>
            <div class="error" id="error">PIN incorrecto. Intenta nuevamente.</div>
        </form>
        
        <!-- Créditos -->
        <div style="margin-top: 30px; text-align: center; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1);">
            <div style="color: rgba(255, 255, 255, 0.6); font-size: 13px; margin-bottom: 8px;">
                Desarrollado por
            </div>
            <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                <img src="https://raw.githubusercontent.com/CristianBatero/panel_web/main/icono.png" alt="CrisDev" style="width: 32px; height: 32px; border-radius: 8px;">
                <div>
                    <div style="color: #FFFFFF; font-weight: 600; font-size: 15px;">CrisDev</div>
                    <a href="https://t.me/crisis1823" target="_blank" style="color: #007AFF; text-decoration: none; font-size: 13px; display: flex; align-items: center; gap: 4px; justify-content: center;">
                        <span>📱</span> @crisis1823
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pin = document.getElementById('pin').value;
            const errorDiv = document.getElementById('error');
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `pin=${encodeURIComponent(pin)}`
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    errorDiv.style.display = 'block';
                    document.getElementById('pin').value = '';
                }
            } catch (error) {
                errorDiv.textContent = 'Error de conexión';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
